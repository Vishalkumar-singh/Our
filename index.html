<!doctypehtml><html lang=en><meta charset=UTF-8><meta content="width=device-width,initial-scale=1"name=viewport><title>Protected Access</title><link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap"rel=stylesheet><style>*{margin:0;padding:0;box-sizing:border-box;font-family:Poppins,sans-serif}body{min-height:100vh;display:flex;justify-content:center;align-items:center;padding:20px;background-color:#fff5f7}.card{width:100%;max-width:380px;padding:35px;text-align:center;border-radius:30px;background:rgba(255,255,255,.7);backdrop-filter:blur(20px);box-shadow:0 20px 50px rgba(0,0,0,.12)}.logo{font-size:60px;margin-bottom:10px}h1{font-size:30px;color:#444;margin-bottom:8px}p{font-size:14px;color:#666;margin-bottom:25px}input{width:100%;padding:16px;border:none;outline:0;border-radius:18px;font-size:16px;margin-bottom:20px;box-shadow:0 5px 15px rgba(0,0,0,.08)}button{width:100%;padding:16px;border:none;cursor:pointer;font-size:16px;font-weight:700;border-radius:18px;color:#fff;background:linear-gradient(135deg,#ff79b0,#7d9cff);transition:.3s}button:hover{transform:translateY(-3px)}@media (max-width:480px){.card{padding:28px 22px}}@media screen and (max-width:480px){body{padding:16px}.card{max-width:100%;padding:28px 22px;border-radius:26px}.logo{font-size:52px}h1{font-size:26px}p{font-size:13px;margin-bottom:20px}input{padding:15px;font-size:16px;margin-bottom:18px}button{padding:15px;font-size:16px}}@media screen and (max-width:320px){body{padding:10px}.card{padding:22px 16px;border-radius:22px}.logo{font-size:44px}h1{font-size:22px}p{font-size:12px}input{padding:14px;font-size:15px}button{padding:14px;font-size:15px}}</style><div class=card><div class=logo>🔐</div><h1>Our Memory</h1><p>Enter password to continue</p><input id=password placeholder="Enter Password"type=password> <button onclick=login()>✨ Continue</button></div><script>const correctHash="579e0a8d46e30b659c40217036d07e60058b73f218731d1d6a695d36b856c86a";async function hashString(e){e=(new TextEncoder).encode(e),e=await crypto.subtle.digest("SHA-256",e);const t=Array.from(new Uint8Array(e));return t.map(e=>e.toString(16).padStart(2,"0")).join("")}async function login(){await hashString(document.getElementById("password").value.trim())===correctHash?(sessionStorage.setItem("access","yes"),window.location.href="main.html"):(alert("❌ Invalid Password"),document.getElementById("password").value="",document.getElementById("password").focus())}document.getElementById("password").addEventListener("keydown",function(e){"Enter"===e.key&&login()})</script>
